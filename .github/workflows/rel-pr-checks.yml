name: REL PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [release-hardening/rel2-national-launch]

concurrency:
  group: rel-pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rel-pr-checks:
    name: REL32 PR gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADMIN_PASSWORD: test-admin-password
      SECRET_KEY: test-secret-key
      DATABASE_URL: sqlite:////tmp/mizan_rel_pr_checks.db
      OPENAI_API_KEY: ''
      REL2_SKIP_EXPORT_EVIDENCE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: py_compile core modules
        run: |
          python -m py_compile app.py professional_strategy_render.py

      - name: pytest REL32 gate suite
        run: |
          python -m pytest \
            tests/test_rel32_frozen_artifact_export_lock.py \
            tests/test_rel32_complete_strategy_compiler.py \
            tests/test_rel32_kpi_assessment_guides_repair.py \
            tests/test_rel32_table_schema_binding.py \
            tests/test_rel32_preview_table_dom_binding.py \
            tests/test_enterprise_document_factory_foundation.py \
            -q

      - name: rel32 cyber AR export smoke
        run: python scripts/rel32_cyber_ar_export_smoke.py

      - name: smoke document type matrix
        run: python scripts/smoke_document_type_matrix.py
